<script>
    window.onload = function () {

        
        changeTenant('LoginInput_TenantId');
        getLocation();
    }


    function validate(evt) {
        var theEvent = evt || window.event;

        // Handle paste
        if (theEvent.type === 'paste') {
            key = event.clipboardData.getData('text/plain');
        } else {
            // Handle key press
            var key = theEvent.keyCode || theEvent.which;
            if (key == 13) return;
            key = String.fromCharCode(key);
        }
        var regex = /[0-9]|\./;
        if (!regex.test(key)) {
            theEvent.returnValue = false;
            if (theEvent.preventDefault) theEvent.preventDefault();
        }
    }



        function changeTenant(id) {
            var enable = $("#" + id + " :selected").attr("data-enableotp");

            var otpInput = document.getElementsByClassName("input-otp")["0"];
            var otpGroup = document.getElementsByClassName(" group-otp")["0"];

            //var tenantId = $("#LoginInput_TenantId").attr;
            var tenantId = $("#" + id + " :selected")?.attr("value");
            setCookie("tenantId", tenantId, 1);

            if (enable?.toLowerCase() == "true" || typeof enable === 'undefined') {
                otpInput.value = "";
                otpGroup.style.display = "block";
            }
            else {
                otpInput.value = "000000";
                otpGroup.style.display = "none";
            }
        }

  

        function setCookie(name, value, hours) {
            var expires = "";
            if (hours) {
                var date = new Date();
                //date.setTime(date.getTime() + (days * 24 * 60 * 60 * 1000));
                //date.setTime(date.getTime() + (minutes * 60 * 1000));
                date.setTime(date.getTime() + (hours * 60 * 60 * 1000));
                expires = "; expires=" + date.toUTCString();
            }
            document.cookie = name + "=" + (value || "") + expires + "; path=/";
        }

    $(".toggle-password").click(function () {

        $(this).toggleClass("fa-eye fa-eye-slash");
        var input = $($(this).attr("toggle"));
        if (input.attr("type") == "password") {
            input.attr("type", "text");
        } else {
            input.attr("type", "password");
        }
    });

    function getLocation() {
        if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(showPosition);
        }

        function showPosition(position) {
            console.log(position.coords.latitude);

            $('#latitude').val(position.coords.latitude);
            $('#longitude').val(position.coords.longitude);
          
        };
    };


</script>
