# Flow: Tạo phiếu nhập khác
# Author: recorder
# Created: 2026-06-04
# Run: npm run play -- --app web-eho tạo-phiếu-nhập-khác.yaml

name: Tạo phiếu nhập khác
description: "Recorded flow: Tạo phiếu nhập khác"
tags:
  - recorded
author: recorder
created: "2026-06-04"
config:
  baseUrl: https://ci-eho-web.frt.vn
  timeout: 30000
variables: {}
steps:
  - name: Navigate to https://ci-eho-web.frt.vn
    action: goto
    value: https://ci-eho-web.frt.vn
    waitAfter: networkIdle
  - name: "Click #mat-input-3"
    action: click
    delay: 1000
    selectorFallback: >-
      #mat-input-3 || .kt-form > div:nth-of-type(3) > mat-form-field > div > div:nth-of-type(1) > div > input || div >
      div > div > div > div > form > div:nth-of-type(3) > mat-form-field > div > div:nth-of-type(1) > div > input
    selector: "#mat-input-3"
  - name: "Fill #mat-input-3"
    action: fill
    value: ngocdtm3
    delay: 1000
    selectorFallback: >-
      #mat-input-3 || .kt-form > div:nth-of-type(3) > mat-form-field > div > div:nth-of-type(1) > div > input || div >
      div > div > div > div > form > div:nth-of-type(3) > mat-form-field > div > div:nth-of-type(1) > div > input
    selector: "#mat-input-3"
  - name: Press Tab
    action: keyboard
    key: Tab
    delay: 1000
  - name: "Fill #mat-input-4"
    action: fill
    value: "1"
    delay: 1000
    selectorFallback: >-
      #mat-input-4 || .kt-form > div:nth-of-type(4) > mat-form-field > div > div:nth-of-type(1) > div > input || div >
      div > div > div > div > form > div:nth-of-type(4) > mat-form-field > div > div:nth-of-type(1) > div > input
    selector: "#mat-input-4"
  - name: Click button "Đăng nhập"
    action: click
    delay: 1000
    selectorFallback: >-
      #kt_login_signin_submit || .kt-login__actions > button || div > div > div > div > div > form > div:nth-of-type(7)
      > button
    role:
      type: button
      name: Đăng nhập
    waitAfter: networkIdle
  - name: Click link "Nhập khác xuất khác"
    action: click
    delay: 1000
    selectorFallback: >-
      .pb-4 > div:nth-of-type(3) > a || div > div:nth-of-type(1) > div > main > div:nth-of-type(1) > div:nth-of-type(2)
      > div:nth-of-type(3) > a
    role:
      type: link
      name: Nhập khác xuất khác
    waitAfter: networkIdle
  - name: Click button "Tạo yêu cầu"
    action: click
    delay: 1000
    waitAfter: 2000
    selectorFallback: >-
      .right-content > button:nth-of-type(3) || div:nth-of-type(1) > div:nth-of-type(1) > div > div:nth-of-type(2) >
      div:nth-of-type(1) > div > div:nth-of-type(2) > button:nth-of-type(3)
    role:
      type: button
      name: Tạo yêu cầu
  - name: Chọn "80012 - LC HCM 169 Phạm Hữu Lầu, P. Phú Thuận"
    action: selectOption
    trigger:
      relative:
        form: A
        anchor:
          text: Thêm sản phẩm
          dynamic: false
        scope:
          by: css
          css: "[role='dialog']"
        target:
          type: selector
          selector: ".ant-select:has(#shopCode) .ant-select-selector"
      selectorFallback: "[role='dialog'] .ant-select:has(#shopCode) .ant-select-selector"
    value: 80012 - LC HCM 169 Phạm Hữu Lầu, P. Phú Thuận
    search: true
    searchText: "80012"
    delay: 1000
  - name: Scroll element .list-whs
    action: scroll
    scrollTo:
      x: 0
      "y": 193
    selector: .list-whs
  - name: Click "div:nth-of-type(2) > div:nth-of-type(10)" trong "Danh sách kho"
    action: click
    delay: 1000
    selectorFallback: >-
      .list-whs > div:nth-of-type(10) || div:nth-of-type(3) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div
      > div:nth-of-type(2) > form > div:nth-of-type(2) > div:nth-of-type(1) > div > div:nth-of-type(2) >
      div:nth-of-type(10)
    relative:
      form: A
      anchor:
        text: Danh sách kho
        dynamic: false
      scope:
        by: css
        css: .w-full
      target:
        type: selector
        selector: div:nth-of-type(2) > div:nth-of-type(10)
  - name: Chọn "00001221 - BETADINE SÁT KHUẨN NHỎ CHAI 30ML" ở "Nhập tên hoặc mã thuốc (F1)"
    action: selectOption
    trigger:
      placeholder: Nhập tên hoặc mã thuốc (F1)
      selectorFallback: >-
        #rc_select_8 || div:nth-of-type(3) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div >
        div:nth-of-type(2) > form > div:nth-of-type(2) > div:nth-of-type(2) > div > div:nth-of-type(2) > div > span >
        span:nth-of-type(1) > span > input
    value: 00001221 - BETADINE SÁT KHUẨN NHỎ CHAI 30ML
    search: true
    searchText: "00001221"
    delay: 1000
  - name: Chọn "Phiếu nhập" ở "Chọn loại phiếu"
    action: selectOption
    trigger:
      relative:
        form: A
        anchor:
          text: Chọn loại phiếu
          dynamic: false
        scope:
          by: css
          css: .ant-select-selection-wrap
        target:
          type: selector
          selector: "[role=\"combobox\"]"
      selectorFallback: >-
        #griType || div:nth-of-type(6) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(2)
        > form > div:nth-of-type(1) > div > div > div > div:nth-of-type(2) > div > div > div > div > span >
        span:nth-of-type(1) > input
    value: Phiếu nhập
    delay: 1000
  - name: Chọn "Chai" ở "Đơn vị tính"
    action: selectOption
    trigger:
      relative:
        form: A
        anchor:
          text: Đơn vị tính
          dynamic: false
        scope:
          by: css
          css: .ant-select-selection-wrap
        target:
          type: selector
          selector: "[role=\"combobox\"]"
      selectorFallback: >-
        #unitCode || div:nth-of-type(6) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(2)
        > form > div:nth-of-type(2) > div > div > div > div:nth-of-type(2) > div > div > div > div > span >
        span:nth-of-type(1) > input
    value: Chai
    delay: 1000
  - name: Click "input[type="text"]" trong "Số lượng"
    action: click
    delay: 1000
    selectorFallback: >-
      #quantity || div:nth-of-type(6) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(2) >
      form > div:nth-of-type(3) > div > div > div > div:nth-of-type(2) > div > div > input
    relative:
      form: A
      anchor:
        text: Số lượng
        dynamic: false
      scope:
        by: css
        css: .ant-form-item
      target:
        type: selector
        selector: input[type="text"]
  - name: Fill "input[type="text"]" trong "Số lượng"
    action: fill
    value: "15"
    delay: 1000
    selectorFallback: >-
      #quantity || div:nth-of-type(6) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(2) >
      form > div:nth-of-type(3) > div > div > div > div:nth-of-type(2) > div > div > input
    relative:
      form: A
      anchor:
        text: Số lượng
        dynamic: false
      scope:
        by: css
        css: .ant-form-item
      target:
        type: selector
        selector: input[type="text"]
  - name: Chọn "Xuất thanh lý" ở "Ghi chú"
    action: selectOption
    trigger:
      relative:
        form: A
        anchor:
          text: Ghi chú
          dynamic: false
        scope:
          by: css
          css: .ant-form
        target:
          type: selector
          selector: >-
            div:nth-of-type(5) > div > div > div > div:nth-of-type(2) > div > div > div > div > span >
            span:nth-of-type(1) > input
      selectorFallback: >-
        #sourceType || div:nth-of-type(6) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div >
        div:nth-of-type(2) > form > div:nth-of-type(5) > div > div > div > div:nth-of-type(2) > div > div > div > div >
        span > span:nth-of-type(1) > input
    value: Xuất thanh lý
    delay: 1000
  - name: Click ".ant-btn" trong "Thông tin sản phẩm"
    action: click
    delay: 1000
    selectorFallback: div:nth-of-type(6) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(3) > div > button
    relative:
      form: A
      anchor:
        text: Thông tin sản phẩm
        dynamic: false
      scope:
        by: css
        css: .ant-modal-content
      target:
        type: selector
        selector: .ant-btn
  - name: Click button "Xác nhận"
    action: click
    delay: 1000
    selectorFallback: >-
      div:nth-of-type(3) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(3) > div > div >
      button
    role:
      type: button
      name: Xác nhận
    waitAfter: 4000
  - name: Click button "Hoàn thành"
    action: click
    delay: 2000
    timeout: 60000
    selectorFallback: >-
      .right-content > button:nth-of-type(3) || div > div:nth-of-type(1) > div > div:nth-of-type(2) > div:nth-of-type(1)
      > div:nth-of-type(1) > div:nth-of-type(2) > button:nth-of-type(3)
    role:
      type: button
      name: Hoàn thành
  - name: Click button "Đồng ý (Enter)"
    action: click
    delay: 1000
    timeout: 60000
    selectorFallback: >-
      div:nth-of-type(2) > div > div:nth-of-type(2) > div > div:nth-of-type(1) > div > div:nth-of-type(2) > div >
      button:nth-of-type(2)
    role:
      type: button
      name: Đồng ý (Enter)
    waitAfter: networkIdle
  - name: Click button "Tìm kiếm"
    action: click
    delay: 1000
    selectorFallback: >-
      .header > form > div > div:nth-of-type(2) > div:nth-of-type(6) > div > div > div > div > button || div >
      div:nth-of-type(1) > div > div:nth-of-type(2) > div:nth-of-type(1) > form > div > div:nth-of-type(2) >
      div:nth-of-type(6) > div > div > div > div > button
    role:
      type: button
      name: Tìm kiếm
  - name: Click button "Tìm kiếm"
    action: click
    delay: 1000
    selectorFallback: >-
      .header > form > div > div:nth-of-type(2) > div:nth-of-type(6) > div > div > div > div > button || div >
      div:nth-of-type(1) > div > div:nth-of-type(2) > div:nth-of-type(1) > form > div > div:nth-of-type(2) >
      div:nth-of-type(6) > div > div > div > div > button
    role:
      type: button
      name: Tìm kiếm
  - name: Click ".ant-btn-icon-only" trong "Import"
    action: click
    delay: 1000
    selectorFallback: .header > form > div > div:nth-of-type(2) > div:nth-of-type(5) > div > div > div > div > button
    relative:
      form: A
      anchor:
        text: Import
        dynamic: false
      scope:
        by: css
        css: .bg-white
      target:
        type: selector
        selector: .ant-btn-icon-only
assertions: []
