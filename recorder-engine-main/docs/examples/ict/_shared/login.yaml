# Shared Flow: Login RSA Ecom
# Dùng chung cho tất cả test flows cần login
# Import: use: _shared/login.yaml

name: Login RSA Ecom
description: Login vào hệ thống RSA Ecom qua SSO identity-beta.frt.vn
tags: [shared, login]
author: HienNTN
created: "2025-05-29"

variables:
  username: "hienntn"
  password: "f"
  login_url: "https://ci.ict.frt.vn/"

steps:
  - name: Mở trang RSA Ecom
    action: goto
    value: "{{login_url}}"
    waitAfter: networkIdle

  - name: Đợi redirect SSO login
    action: wait
    value: "**/Account/Login**"
    timeout: 30000

  - name: Nhập tài khoản
    action: fill
    selector: "#mat-input-3"
    value: "{{username}}"

  - name: Nhập mật khẩu
    action: fill
    selector: "#mat-input-4"
    value: "{{password}}"

  - name: Bấm Đăng nhập
    action: click
    role: { type: button, name: "Đăng nhập" }
    waitAfter: networkIdle
    delay: 3000
