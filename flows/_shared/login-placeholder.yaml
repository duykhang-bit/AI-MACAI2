# =============================================================
# LOGIN PLACEHOLDER — Hướng dẫn tester tự record login flow
# =============================================================
#
# File này là TEMPLATE. Mỗi chuỗi cần tự record login flow riêng.
#
# Cách làm:
#   1. Chạy: frt-test record -n "Login <chuỗi>" -u <BASE_URL>
#   2. Thực hiện login trên browser (nhập user/pass, bấm đăng nhập)
#   3. Dừng record → file YAML được tạo tự động
#   4. Copy nội dung vào flows/_shared/login.yaml (ghi đè file này)
#
# Hoặc sửa trực tiếp template bên dưới cho phù hợp chuỗi của bạn.
# =============================================================

name: Login (Placeholder)
description: Template login — sửa selector và URL cho chuỗi của bạn
tags: [shared, login, placeholder]
author: Template

variables:
  username: "{{TEST_USERNAME}}"
  password: "{{TEST_PASSWORD}}"
  login_url: "{{BASE_URL}}"

steps:
  - name: Mở trang đăng nhập
    action: goto
    value: "{{login_url}}"
    waitAfter: networkIdle

  - name: Nhập tài khoản
    action: fill
    selector: "input[name='username']"    # ← Sửa selector cho đúng
    value: "{{username}}"

  - name: Nhập mật khẩu
    action: fill
    selector: "input[name='password']"    # ← Sửa selector cho đúng
    value: "{{password}}"

  - name: Bấm Đăng nhập
    action: click
    selector: "button[type='submit']"     # ← Sửa selector cho đúng
    waitAfter: networkIdle
    delay: 3000
